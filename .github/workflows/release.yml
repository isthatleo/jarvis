name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and validate everything without publishing"
        type: boolean
        default: true
      tag:
        description: "Version tag to simulate (e.g. v0.1.0-test.1)"
        required: true
        default: "v0.0.0-dry-run"

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  BUN_VERSION: "latest"
  SIDECAR_BIN: jarvis-sidecar
  DRY_RUN: ${{ inputs.dry_run || false }}
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # ─── Gate: run tests before anything else ───────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - run: bun test
      - run: bunx tsc --noEmit

  # ─── Cross-compile Go sidecars ─────────────────────────────────
  build-sidecar:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            npm_pkg: darwin-arm64
          - goos: darwin
            goarch: amd64
            npm_pkg: darwin-x64
          - goos: linux
            goarch: amd64
            npm_pkg: linux-x64
          - goos: linux
            goarch: arm64
            npm_pkg: linux-arm64
          - goos: windows
            goarch: amd64
            npm_pkg: win32-x64
            ext: .exe
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: sidecar/go.sum

      - name: Build sidecar (${{ matrix.goos }}/${{ matrix.goarch }})
        working-directory: sidecar
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w" -o "${{ env.SIDECAR_BIN }}${{ matrix.ext || '' }}" .

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: sidecar-${{ matrix.npm_pkg }}
          path: sidecar/${{ env.SIDECAR_BIN }}${{ matrix.ext || '' }}

  # ─── Publish sidecar packages to npm ───────────────────────────
  publish-sidecar:
    needs: build-sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download all sidecar binaries
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare platform packages
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            pkg_dir="sidecar/npm/${platform}"
            mkdir -p "${pkg_dir}/bin"

            # Copy binary
            cp "artifacts/sidecar-${platform}/"* "${pkg_dir}/bin/"
            chmod +x "${pkg_dir}/bin/"*

            # Update version
            cd "${pkg_dir}"
            npm version "${VERSION}" --no-git-tag-version --allow-same-version
            cd "$GITHUB_WORKSPACE"
          done

          # Update wrapper package version and dependency versions
          cd sidecar/npm/jarvis-sidecar
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

          # Update optionalDependencies versions
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            sed -i "s|\"@usejarvis/sidecar-${platform}\": \".*\"|\"@usejarvis/sidecar-${platform}\": \"${VERSION}\"|" package.json
          done

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish platform packages
        run: |
          FLAGS=""
          if [ "$DRY_RUN" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if echo "${{ steps.version.outputs.VERSION }}" | grep -q '-'; then FLAGS="$FLAGS --tag next"; fi

          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            echo "Publishing @usejarvis/sidecar-${platform}... ${FLAGS}"
            cd "sidecar/npm/${platform}"
            npm publish --access public $FLAGS
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish wrapper package
        run: |
          FLAGS=""
          if [ "$DRY_RUN" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if echo "${{ steps.version.outputs.VERSION }}" | grep -q '-'; then FLAGS="$FLAGS --tag next"; fi

          cd sidecar/npm/jarvis-sidecar
          npm publish --access public $FLAGS

  # ─── Publish main brain package to npm ─────────────────────────
  publish-brain:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version --allow-same-version

      - name: Build UI
        run: bun run prepublishOnly

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        run: |
          FLAGS=""
          if [ "$DRY_RUN" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if echo "${{ steps.version.outputs.VERSION }}" | grep -q '-'; then FLAGS="$FLAGS --tag next"; fi
          npm publish --access public $FLAGS

  # ─── Create GitHub Release with binaries ───────────────────────
  github-release:
    needs: build-sidecar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all sidecar binaries
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package release assets
        run: |
          mkdir -p release

          # Create archives for each platform
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            chmod +x "artifacts/sidecar-${platform}/${{ env.SIDECAR_BIN }}"
            tar -czf "release/${{ env.SIDECAR_BIN }}-v${{ steps.version.outputs.VERSION }}-${platform}.tar.gz" \
              -C "artifacts/sidecar-${platform}" "${{ env.SIDECAR_BIN }}"
          done

          # Windows gets a zip
          cd "artifacts/sidecar-win32-x64"
          zip "../../release/${{ env.SIDECAR_BIN }}-v${{ steps.version.outputs.VERSION }}-win32-x64.zip" \
            "${{ env.SIDECAR_BIN }}.exe"
          cd "$GITHUB_WORKSPACE"

      - name: Generate install instructions
        id: install
        run: |
          DAEMON_PKG=$(jq -r .name package.json)
          SIDECAR_PKG=$(jq -r .name sidecar/npm/jarvis-sidecar/package.json)

          cat > release/INSTALL.md << EOF
          ## Installation

          \`\`\`bash
          # Install the daemon
          npm install -g ${DAEMON_PKG}

          # Install the sidecar (auto-selects your platform)
          npm install -g ${SIDECAR_PKG}
          \`\`\`

          Or download the sidecar binary for your platform from the assets below.
          EOF

      - name: Create GitHub Release
        if: env.DRY_RUN != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Jarvis v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          append_body: true
          body_path: release/INSTALL.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            release/*.tar.gz
            release/*.zip

      - name: Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "::notice::DRY RUN — skipped GitHub Release creation"
          echo "Would have created release v${{ steps.version.outputs.VERSION }}"
          echo "Assets that would be attached:"
          ls -lh release/

  # ─── Notify Discord about the new release ──────────────────────
  discord-notify:
    needs: github-release
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Get release notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/tags/${RELEASE_TAG})
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body')
          HTML_URL=$(echo "$RELEASE_JSON" | jq -r '.html_url')
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')

          # Extract "What's Changed" section (everything between "## What's Changed" and the next "## " heading or end)
          WHATS_CHANGED=$(echo "$BODY" | sed -n '/^## What'\''s Changed/,/^## /{ /^## What'\''s Changed/p; /^## [^W]/!{ /^## What'\''s Changed/!p; }; }')

          # Store in files to avoid delimiter issues
          echo "$WHATS_CHANGED" > /tmp/whats_changed.txt
          echo "$HTML_URL" > /tmp/html_url.txt
          echo "$TAG" > /tmp/tag.txt

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TAG=$(cat /tmp/tag.txt)
          HTML_URL=$(cat /tmp/html_url.txt)
          WHATS_CHANGED=$(cat /tmp/whats_changed.txt)

          # Build the Discord message
          MESSAGE="@everyone

          **Jarvis ${TAG} has been released!** 🎉

          ${WHATS_CHANGED}

          🔗 **Full release:** ${HTML_URL}"

          # Post to Discord via webhook
          # Trim leading whitespace from heredoc indentation
          MESSAGE=$(echo "$MESSAGE" | sed 's/^          //')

          jq -n --arg content "$MESSAGE" '{"content": $content, "flags": 4}' | \
            curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-
